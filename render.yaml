services:
  - type: web
    name: legal-advisor-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: DB_PATH
        value: data_vector_db
     